name: hnefatafl
version: 0.0.16

spec-version: 0.35.0
verbatim:
  cabal-version: 2.4

language: GHC2021

default-extensions:
  - TemplateHaskell
  - OverloadedStrings
  - OverloadedRecordDot
  - OverloadedLabels
  - DuplicateRecordFields
  - LambdaCase
  - DerivingVia
  - ImportQualifiedPost
  - MultilineStrings

ghc-options:
  - -Wunused-imports
  - -Wall
  - -Werror
  - -Wmissing-export-lists
  - -Wno-missing-home-modules
  - -Widentities
  - -Wpartial-fields
  - -Wcpp-undef
  - -Wno-orphans
  - -fprint-potential-instances
  - -threaded
  - -O2
  - -finfo-table-map
  - -fdistinct-constructor-tables
  # Below is a magical incantation that allows linking against archive library ".a" files
  # https://stackoverflow.com/questions/36040366/haskell-cabal-include-static-library
  - -pgml g++ "-optl-Wl,--allow-multiple-definition" "-optl-Wl,--whole-archive" "-optl-Wl,-Bstatic" "-optl-Wl,-lhnefatafl" "-optl-Wl,-Bdynamic" "-optl-Wl,--no-whole-archive"

data-files:
  - db/schema.sql

dependencies:
  - name: ''
    #version: ">= 1.1.0.0"
    mixin:
      - relude
  - name: base
    #version: ">=4.15"
    mixin:
      - hiding (Prelude)
  - name: relude
    #version: ">= 1.1.0.0"
    mixin:
      - (Relude as Prelude)
  - derive-storable
  - derive-storable-plugin
  - sqlite-simple
  - text
  - uuid-types
  - heptapod
  - effectful
  - effectful-th
  - optics
  - transformers
  - attoparsec
  - array
  - split
  - optparse-applicative
  - either
  - aeson
  - aeson-pretty
  - chronos
  - template-haskell
  - safe-exceptions
  - servant
  - servant-server
  - servant-client
  - servant-client-core
  - servant-effectful
  - wai
  - warp
  - time
  - async
  - clock
  - stm
  - stm-containers
  - list-t
  - focus
  - filepath
  - temporary
  - directory
  - brick
  - vty
  - vty-unix
  - http-client
  - http-api-data
  - websockets
  - wai-websockets
  - resourcet
  - openapi3
  - servant-openapi3
  - katip
  - katip-effectful
  - hs-opentelemetry-api
  - hs-opentelemetry-sdk
  - hs-opentelemetry-exporter-otlp
  - hs-opentelemetry-instrumentation-wai
  - hs-opentelemetry-propagator-w3c

executables:
  cli:
    main: "Main.hs"
    source-dirs: cli
    dependencies:
      - hnefatafl
  dump-specs:
    main: "Main.hs"
    source-dirs: dump-specs
    dependencies:
      - hnefatafl
      - aeson-pretty
      
library:
  source-dirs: src
  dependencies:
    - hnefatafl-version
    - insert-ordered-containers

internal-libraries:
  hnefatafl-version:
    source-dirs: version
    language: GHC2021
    dependencies:
      - template-haskell
      - time

tests:
  hnefatafl-test:
    main: "Driver.hs"
    ghc-options:
      - -Wno-missing-export-lists
    source-dirs: test
    build-tools:
        tasty-discover:tasty-discover
    dependencies:
      - hnefatafl-version
      - hnefatafl
      - hspec
      - hspec-expectations-pretty-diff
      - tasty
      - tasty-hunit
      - tasty-hspec
      - tasty-discover
      - temporary
      - process
      - direct-sqlite
      - optics
      - http-client
      - servant-client
      - async
      - QuickCheck
      - tasty-quickcheck
      - websockets
      - stm
      - aeson

